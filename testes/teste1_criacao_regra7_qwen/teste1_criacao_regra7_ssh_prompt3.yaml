title: Suspicious SSH Tunneling Activity
id: 5678-9abc-defgh
status: experimental
description: |
    Detects suspicious activity related to the use of a tunnel (SSH reverse shell) for persistence on Windows systems. This includes monitoring processes that create tunnels using 'schtasks.exe' or similar commands, and specifically looking for signs of an OpenSSH server being used in conjunction with these activities.
references:
    - https://www.microsoft.com/en-us/security/blog/2017/06/14/ssh-tunneling-activity/
author: YourName
date: 2023-05-12
tags:
    - attack.lateral-movement
    - attack.t1021.004
logsource:
    product: windows
detection:
    selection:
        EventID: 4
        process: schtasks.exe
        payload|startswith: 'Server listening on '
    condition: selection
falsepositives:
    - Legitimate administrator activity
level: medium
