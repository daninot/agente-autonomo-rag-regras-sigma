LOGSOURCE: The indicator would appear in the Windows Event Logs, specifically in the category of process creation or file events.

FIELDS: The fields that contain the indicator are TargetFilename (for the PSEXESVC.exe file) and PipeName (for the named pipe created by PsExec).

MODIFIERS: For TargetFilename, |endswith is the correct choice because we're looking for files with a specific extension (.exe). For PipeName, |contains is the correct choice because the named pipe name may appear anywhere in the path.

ATT&CK: The technique that best describes this threat is t1569.002 (Lateral Movement).

