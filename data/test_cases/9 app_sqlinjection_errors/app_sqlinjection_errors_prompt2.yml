title: Suspicious SQL Error Messages
id: 12345678-1234-5678-9012-345678901234
status: test
description: Detects suspicious SQL error messages indicating probing for an injection attack.
references:
    - http://www.sqlinjection.net/errors
author: [Your Name]
date: 2023-02-20
tags:
    - attack.t1005
logsource:
    category: file_event
detection:
    selection_sql_error:
        CommandLine|contains:
            - 'SQL syntax near'
            - 'near keyword'
            - 'syntax error in identifier position'
            - 'UNION ALL SELECT'
            - 'LIKE '
            - '-- '
            - '# '
            - 'information_schema'
    condition: any of selection_sql_error
falsepositives:
    - Unknown
level: medium