The log source that fits best is `registry_event` because the indicator of the threat (Group Policy modification) would appear in the registry.

The fields that contain the indicator are `RegistryPath` and possibly others depending on how the Group Policy settings are stored.

For each field, exact match is likely the correct choice since we're looking for specific values or paths.

The ATT&CK technique that best describes this threat is T1484.001 - Group Policy Modification.

