LOGSOURCE: The indicator would appear in the HTTP request or response logs, so "webserver" is the best fit.

FIELDS: The fields that contain the indicator of the threat are likely to be "request_uri" (or "uri") and possibly "http_method".

MODIFIERS: For "request_uri", |contains is the correct choice because it may appear anywhere in the path. For "http_method", exact match is the correct choice.

ATT&CK: The technique that best describes this threat is T1071.001, Application Layer Protocol: Web Protocols.

```yml
title: WebDAV Server Abuse

id: 5f6b3a4d-1234-5678-90ab-cdef01234567

description: Detects abuse of WebDAV server to download custom files

references:
  - http://carnal0wnage.attackresearch.com/2012/06/webdav-server-to-download-custom.html
  - https://github.com/OTRF/detection-hackathon-apt29

logsource:
  category: webserver
  product: web_server_logs

selection:
  request_uri:
    contains: /webdav/
    size_is: greater than 10
  http_method:
    equals: PUT

falsepositives:
  - Legitimate use of WebDAV server for file sharing

level: critical
```